<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ana Sayfa - Tyke Documents</title>
  <script src="js/theme.js"></script>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
  <div class="app-layout">
    <aside class="sidebar frosted-glass">
      <div class="sidebar-logo">
        <img src="https://i.imgur.com/kAwKJxV.png" alt="Tyke Logo">
      </div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item active">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          Dokümanlar
        </a>

        <div class="sidebar-section">
          <div class="section-title">
            <span>KLASÖRLER</span>
            <button id="add-folder-btn" title="Yeni Klasör">+</button>
          </div>
          <div id="folders-list" class="folders-list">
            <!-- Folders loaded here -->
          </div>
        </div>

        <a href="settings.html" class="nav-item">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
            </path>
          </svg>
          Ayarlar
        </a>
      </nav>
      <div class="sidebar-footer">
        <button id="logout-btn" class="btn btn-text">Çıkış Yap</button>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="search-bar">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" id="search-input" placeholder="Dokümanlarda ara...">
        </div>
        <div class="user-profile">
          <div id="user-avatar" class="avatar">U</div>
        </div>
      </header>

      <div class="content-body">
        <section class="create-section">
          <div class="section-header">
            <h2>Yeni Doküman</h2>
            <div class="section-actions">
              <button class="btn btn-text" id="btn-show-graph">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                  style="margin-right:8px;">
                  <circle cx="18" cy="5" r="3"></circle>
                  <circle cx="6" cy="12" r="3"></circle>
                  <circle cx="18" cy="19" r="3"></circle>
                  <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                  <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                </svg>
                Ağ Grafiği
              </button>
              <button class="btn btn-text" onclick="document.getElementById('import-tdtf').click()">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                  style="margin-right:8px;">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                  <polyline points="17 8 12 3 7 8"></polyline>
                  <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                .tdtf Yükle
              </button>
              <input type="file" id="import-tdtf" accept=".tdtf" style="display:none">
            </div>
          </div>
          <div class="template-grid">
            <div class="create-card" id="create-doc-btn" data-template="blank">
              <div class="create-icon">+</div>
              <span>Boş Doküman</span>
            </div>
            <div class="create-card" data-template="cv">
              <div class="create-icon">👤</div>
              <span>Özgeçmiş (CV)</span>
            </div>
            <div class="create-card" data-template="report">
              <div class="create-icon">📊</div>
              <span>Rapor</span>
            </div>
            <div class="create-card" data-template="letter">
              <div class="create-icon">✉️</div>
              <span>Mektup</span>
            </div>
          </div>
        </section>

        <section class="recent-section">
          <div class="section-header">
            <h2 id="current-folder-title">Son Dokümanlar</h2>
          </div>
          <div class="documents-grid" id="documents-grid">
            <!-- Documents will be loaded here -->
            <div class="loading">Yükleniyor...</div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <!-- Quick Look Modal -->
  <div id="quick-look-modal" class="modal hide">
    <div class="modal-content frosted-glass">
      <div class="modal-header">
        <h3 id="quick-look-title">Doküman Önizleme</h3>
        <button id="close-quick-look" class="btn-close">&times;</button>
      </div>
      <div id="quick-look-body" class="modal-body ql-editor">
        <!-- Content here -->
      </div>
    </div>
  </div>

  <!-- Graph Modal -->
  <div id="graph-modal" class="modal hide">
    <div class="modal-content frosted-glass" style="width: 80%; height: 80%; max-width: 1000px;">
      <div class="modal-header">
        <h3>Ağ Görünümü (Network Graph)</h3>
        <button id="close-graph" class="btn-close">&times;</button>
      </div>
      <div id="graph-container" class="modal-body" style="padding:0; background:var(--bg-primary); overflow:hidden;">
        <!-- D3 Network rendered here -->
      </div>
    </div>
  </div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(error => {
          console.error('ServiceWorker registration failed:', error);
        });
      });
    }
  </script>
</body>

</html>
