<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş - Tyke Documents</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="https://i.imgur.com/kAwKJxV.png" alt="Tyke Logo">
      </div>
      <h1 id="auth-title">Hoş Geldiniz</h1>
      <p id="auth-subtitle">Devam etmek için giriş yapın.</p>

      <form id="auth-form">
        <div class="input-group">
          <label for="username">Kullanıcı Adı</label>
          <input type="text" id="username" required autocomplete="off" placeholder="Kullanıcı adınızı girin">
        </div>
        <div class="input-group">
          <label for="password">Şifre</label>
          <input type="password" id="password" required placeholder="Şifrenizi girin">
        </div>
        <div id="error-message" class="error-message"></div>
        <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Giriş Yap</button>
      </form>

      <div class="auth-toggle">
        <span id="toggle-text">Hesabınız yok mu?</span>
        <a href="#" id="toggle-link">Kayıt Ol</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>

</html>
